name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install "ruff>=0.14.3"
      - name: ruff check
        run: ruff check src tests sweepable/src sweepable/tests

  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          # sweepable is required by saeco but not yet on PyPI; install it
          # from the in-tree path first so saeco's `sweepable>=0.1.0` resolves.
          pip install -e ./sweepable
          pip install -e ".[dev]"
      - name: Run sweepable tests
        run: pytest sweepable/tests/ -v
      - name: Run saeco tests
        run: pytest tests/ -v
